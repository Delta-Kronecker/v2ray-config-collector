name: Run Script Every 3 Hours

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          echo "requirements.txt not found in root, checking subdirectories..."
          find . -name "requirements.txt" -exec pip install -r {} \;
        fi

    - name: Run main.py
      run: |
        cd v2ray_config_collector
        python main.py

    - name: Check generated files
      run: |
        echo "Checking for generated files in repository:"
        find . -name "*valid*.txt" -type f
        echo ""
        echo "Data directory content:"
        ls -la v2ray_config_collector/data/ || echo "Data directory not found"
        echo ""
        echo "Validated directory content:"
        ls -la v2ray_config_collector/data/validated/working_configs/ 2>/dev/null || echo "Validated directory not found"

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        echo "Current git status:"
        git status
        
        echo "Adding all files:"
        git add --all
        
        if ! git diff --staged --quiet; then
          echo "Changes detected, committing..."
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M:%S') - Valid configs"
          git push
          echo "Changes pushed successfully"
        else
          echo "No changes to commit"
        fi

    - name: Verify final status
      run: |
        echo "Final repository status:"
        git status
        echo ""
        echo "Last commit:"
        git log -1 --oneline
        echo ""
        echo "Generated files:"
        find . -name "*valid*.txt" -type f | head -10