name: Run Script Every 3 Hours

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          REQ_FILE=$(find . -name "requirements.txt" -type f | head -1)
          if [ -n "$REQ_FILE" ]; then
            pip install -r "$REQ_FILE"
          fi
        fi

    - name: Run main.py
      run: |
        MAIN_FILE=$(find . -name "main.py" -type f | head -1)
        if [ -n "$MAIN_FILE" ]; then
          cd "$(dirname "$MAIN_FILE")"
          python "$(basename "$MAIN_FILE")"
        else
          echo "main.py not found"
          exit 1
        fi

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git status
        git add --all
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M:%S') - Valid configs"
          git push origin HEAD:${{ github.ref }}
        fi

    - name: List generated files
      run: |
        find . -path "*/data/validated/*" -name "*.txt" -exec ls -la {} \;